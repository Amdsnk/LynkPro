# Supabase Cron Configuration for Recurring Invoices

# This file configures scheduled tasks for Supabase Edge Functions
# Place this file in: supabase/functions/generate_recurring_invoices/cron.yml

# Generate recurring invoices daily at midnight UTC
schedule: "0 0 * * *"

# Alternative schedules (uncomment to use):
# Every hour: "0 * * * *"
# Every 6 hours: "0 */6 * * *"
# Every day at 2 AM: "0 2 * * *"
# Every Monday at midnight: "0 0 * * 1"

# Cron syntax: minute hour day month weekday
# Examples:
# "0 0 * * *"   - Daily at midnight
# "0 */6 * * *" - Every 6 hours
# "0 0 * * 0"   - Every Sunday at midnight
# "0 0 1 * *"   - First day of every month at midnight
